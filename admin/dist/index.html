<div class="section-title">ОПРЕДЕЛЕНИЕ ТЕРМИНОВ</div>

<p class="indent"><b>Объекты авторских и/или смежных прав или Объекты</b> - под Объектами авторских и/или смежных прав или Объектами в тексте настоящего Договора и/или соответствующих Приложениях и/или дополнениях к нему понимается произведение, исполнение, фонограмма. Перечень Объектов, право использования которых предоставляется по настоящему Договору, указывается в Приложениях к Договору.</p>

<p class="indent"><b>Право использования</b> – исключительные авторские и/или смежные права на использование Объектов, предоставленные Лицензиату по настоящему Договору, на условиях исключительной лицензии в отношении всех предусмотренный действующим законодательством способов использования.</p>

<p class="indent"><b>Обложка</b> – художественное оформление Объектов в виде фотографического произведения или произведения, полученное способами, аналогичными фотографии, произведения изобразительного искусства, дизайна, стопкадра видеозаписи и пр.</p>

<p class="indent"><b>Территория</b> – территория всех стран мира.</p>

<p class="indent"><b>Срок</b> – период времени, на который Лицензиар предоставляет Лицензиату Право использования Объектов. Срок исчисляется с даты заключения настоящего Договора и действует в течение срока действия Договора, указанного в п.8.1. Договора.</p>

<p class="indent">Лицензиар настоящим на Срок и на Территорию предоставляет Лицензиату на условиях исключительной лицензии Право использования указанных в Приложении №1 к настоящему Договору Объектов, а Лицензиат обязуется выплатить Лицензиару вознаграждение, установленное в Договоре, а также выполнять иные обязанности, возложенные на него настоящим Договором.</p>

<p class="indent">Право использования Объектов включает в себя все способы использования, предусмотренные действующим законодательством в отношении всех форм Объектов, представленных как в оригинальной, так и в переработанной форме, в том числе в форме мобильного контента, в форме караоке и др., а также право на использование Объектов в составе сложного объекта, составных произведений и пр.</p>

<p class="indent">Лицензиар как обладатель исключительного права на Объекты и/или обладатель права использования Объектов на условиях исключительной лицензии, уступает (передает) Лицензиату права требования (получения) выплаты вознаграждения в случае использования Объектов следующими способами:</p>

<p>б) за использование Исполнений и Фонограмм на Территории в случаях, когда закон допускает использование объектов смежных прав без согласия правообладателя, но с выплатой ему вознаграждения, а именно: публичное исполнение Фонограмм, опубликованных в коммерческих целях, а также их сообщение в эфир и/или по кабелю (п.1 ст.1326 ГК РФ);</p>

<p class="indent">Обязанность Лицензиата по выплате Лицензиару вознаграждения считается исполненной с момента списания денежных средств с расчетного счета Лицензиата.</p>
