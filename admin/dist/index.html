</div>

<p class="indent">Гражданин Российской Федерации <b>${r.licensorName}</b> (паспорт ${r.passportSeriesNumber}, выдан ${r.passportIssuedBy}, дата выдачи ${r.passportIssueDate}), именуемый в дальнейшем «Лицензиар», с одной стороны, и Индивидуальный предприниматель Орехов Данила Александрович (ОГРНИП 324710000080681), именуемый в дальнейшем «Лицензиат», с другой стороны, совместно именуемые «Стороны», а по отдельности - «Сторона», заключили настоящий Лицензионный договор (далее - «Договор») о нижеследующем:</p>

<div class="section-title">ОПРЕДЕЛЕНИЕ ТЕРМИНОВ</div>

<p class="indent"><b>Объекты авторских и/или смежных прав или Объекты</b> - под Объектами авторских и/или смежных прав или Объектами в тексте настоящего Договора и/или соответствующих Приложениях и/или дополнениях к нему понимается произведение, исполнение, фонограмма. Перечень Объектов, право использования которых предоставляется по настоящему Договору, указывается в Приложениях к Договору.</p>

<p class="indent"><b>Право использования</b> – исключительные авторские и/или смежные права на использование Объектов, предоставленные Лицензиату по настоящему Договору, на условиях исключительной лицензии в отношении всех предусмотренный действующим законодательством способов использования.</p>

<p class="indent"><b>Обложка</b> – художественное оформление Объектов в виде фотографического произведения или произведения, полученное способами, аналогичными фотографии, произведения изобразительного искусства, дизайна, стопкадра видеозаписи и пр.</p>

<p class="indent"><b>Территория</b> – территория всех стран мира.</p>

<p class="indent"><b>Срок</b> – период времени, на который Лицензиар предоставляет Лицензиату Право использования Объектов. Срок исчисляется с даты заключения настоящего Договора и действует в течение срока действия Договора, указанного в п.8.1. Договора.</p>

<div class="section-title">ПРЕДОСТАВЛЕНИЕ ЛИЦЕНЗИИ</div>

<p class="indent">Лицензиар настоящим на Срок и на Территорию предоставляет Лицензиату на условиях исключительной лицензии Право использования указанных в Приложении №1 к настоящему Договору Объектов, а Лицензиат обязуется выплатить Лицензиару вознаграждение, установленное в Договоре, а также выполнять иные обязанности, возложенные на него настоящим Договором.</p>

<p class="indent">За Лицензиаром не сохраняется право выдачи лицензий иным лицам на использование Объектов, передаваемых по настоящему Договору, на Территории и в течение Срока.</p>

<p class="indent">Право использования Объектов включает в себя все способы использования, предусмотренные действующим законодательством в отношении всех форм Объектов, представленных как в оригинальной, так и в переработанной форме, в том числе в форме мобильного контента, в форме караоке и др., а также право на использование Объектов в составе сложного объекта, составных произведений и пр.</p>

<p class="indent">Право использования Объектов, указанных в Приложении № 1 к Договору, считается предоставленным Лицензиату в момент подписания соответствующего Приложения с перечнем таких Объектов.</p>

<p class="indent">Лицензиат вправе самостоятельно определять порядок, способы и условия использования Объектов в любом объеме.</p>

<p class="indent">Лицензиар также предоставляет Лицензиату на условиях исключительной лицензии право использования на Территории и в течение Срока Обложек (при наличие) всеми возможными способами. Вознаграждение Лицензиара за предоставление права использования Обложек включено в вознаграждение за право использования соответствующих Объектов.</p>

<p class="indent">Лицензиат обязуется соблюдать личные неимущественные права авторов, при этом Лицензиат вправе использовать Объекты без указания имен (псевдонимов) авторов, изготовителей фонограмм, исполнителей и иных правообладателей в случаях, если такое указание невозможно в связи с отсутствием технической возможности указания, и подобное использование не будет считаться автором нарушением его личных неимущественных прав.</p>

<p class="indent">В случае, если Объекты не были обнародованы Лицензиаром до момента заключения настоящего Договора, Лицензиар дает Лицензиату согласие на обнародование, что означает осуществление действия, которое впервые делает Объекты доступными для всеобщего сведения путем их опубликования, публичного показа, публичного исполнения, сообщения в эфир или по кабелю, доведения до всеобщего сведения либо любым другим способом.</p>

<p class="indent">Лицензиат вправе обнародовать Объекты самостоятельно, либо путем привлечения для обнародования Объектов третьих лиц.</p>

<p class="indent">Лицензиар разрешает Лицензиату раздельное использование музыкального сопровождения (музыки), в том числе нот (т.е. графических знаков для записи музыкальных звуков) и стихотворного текста Произведений любыми способами и в любой форме, в том числе в форме бегущей строки и/или в форме самостоятельно напечатанного текста и пр.</p>

<p class="indent">Лицензиар как обладатель исключительного права на Объекты и/или обладатель права использования Объектов на условиях исключительной лицензии, уступает (передает) Лицензиату права требования (получения) выплаты вознаграждения в случае использования Объектов следующими способами:</p>

<p>а) за публичное исполнение Произведений, сообщение Произведений в эфир, сообщение Произведений по кабелю (в т.ч. путем ретрансляции); за публичное исполнение или сообщение в эфир или по кабелю Произведений, вошедших в состав аудиовизуальных произведений, (п. 3 ст. 1263 ГК РФ);</p>

<p>б) за использование Исполнений и Фонограмм на Территории в случаях, когда закон допускает использование объектов смежных прав без согласия правообладателя, но с выплатой ему вознаграждения, а именно: публичное исполнение Фонограмм, опубликованных в коммерческих целях, а также их сообщение в эфир и/или по кабелю (п.1 ст.1326 ГК РФ);</p>

<p>в) за свободное воспроизведение Фонограмм и аудиовизуальных произведений (Видеозаписей) исключительно в личных целях (п.1 ст.1245 ГК РФ).</p>

<p class="indent">К уступаемым правам будут относиться требования Лицензиара о выплате вознаграждения, причитающегося ему в течение Срока.</p>

<p class="indent">Указанные выше права переходят к Лицензиату в момент их возникновения у Лицензиара, что означает возможность сбора вознаграждения, в том числе за период, предшествующий заключению настоящего Договора, если суммы такого вознаграждения не были получены Лицензиаром до момента заключения настоящего Договора, а также, право Лицензиара получить суммы такого вознаграждения по истечении Договора, если вознаграждение причиталось за использование передаваемых по настоящему Договору Объектов в течение Срока.</p>

<p class="indent">В соответствии с уступленными Правами Лицензиат вправе обращаться в соответствующую организацию по управлению правами на коллективной основе и оформлять от своего имени документы, необходимые для реализации Прав. Лицензиар соглашается, что организации по управлению правами на коллективной основе вправе передавать полномочия, полученные в соответствии с настоящим пунктом Договора, третьим лицам, в том числе иностранным организациям по управлению правами на коллективной основе, в соответствии с заключенными с ними соглашениями о взаимном представительстве интересов.</p>

<div class="section-title">ФИНАНСОВЫЕ УСЛОВИЯ И ПОРЯДОК РАСЧЕТОВ</div>

<p class="indent">За предоставление Права использования Объектов Лицензиат обязуется выплатить Лицензиару вознаграждение в размере и сроки, указанные в соответствующем дополнительном соглашении к Договору.</p>

<p class="indent">Вознаграждение, указанное в п.3.1 настоящего Договора, является исчерпывающим вознаграждением за Право использования Объектов и Обложек в соответствии с настоящим Договором. Лицензиар не имеет права на получение какого-либо дополнительного вознаграждения, помимо указанного в настоящем Договоре.</p>

<div class="section-title">ГАРАНТИИ</div>

<p class="indent">Лицензиар гарантирует Лицензиату следующее:</p>

<p class="indent">Лицензиар заявляет и гарантирует, что обладает всем необходимым объемом прав для заключения настоящего Договора и исполнения всех обязательств по нему, что ни сами Объекты, ни какая-либо их часть, не являются имитацией, копией или заимствованием другого объекта интеллектуальной собственности;</p>

<p class="indent">Лицензиар обладает в полном объеме исключительным правом на переданные по настоящему Договору Объекты, указанные в настоящем Договоре;</p>

<p class="indent">Лицензиар также гарантирует, что использование Объектов возможно без указания имени (псевдонима) автора в случаях, когда такое указание технически невозможно;</p>

<p class="indent">На момент подписания настоящего Договора, не существует и не будет существовать в будущем никаких прав, обременений и требований третьих лиц в отношении Права использования Объектов;</p>

<p class="indent">Лицензиар несет ответственность за правильность, достоверность и достаточность информации, указанной в Приложениях к настоящему Договору;</p>

<p class="indent">Только Лицензиар имеет право предоставлять на условиях настоящего Договора Право использования Объектов, и на дату заключения Договора не существует ни одного договора либо доверенности, либо иного документа, имеющего силу договора или доверенности, по которому третье лицо вправе распоряжаться Правом использования Объектов, либо иных документов, в силу которых Лицензиар был бы ограничен в возможности распоряжения Правом использования, а все договоры и доверенности, заключенные либо выданные ранее, либо прекращены, либо утратили силу в связи с истечением срока, либо были отозваны;</p>

<p class="indent">Заключение настоящего Договора и исполнение всех обязанностей по нему не противоречит никаким другим обязательствам, взятым на себя Лицензиаром.</p>

<p class="indent">Лицензиар гарантирует, что на момент заключения настоящего Договора он не связан никакими обязательствами, и ему не известны какие-либо обстоятельства, которые препятствуют Лицензиару заключить настоящий Договор и надлежащим образом исполнить все принятые на себя обязательства. Лицензиар обязуется не предпринимать действий, которые могут воспрепятствовать Лицензиату в реализации предоставленных ему по настоящему Договору прав.</p>

<p class="indent">Стороны признают, что Лицензиат заключает настоящий Договор, полагаясь на безусловную действительность и истинность гарантий, данных в настоящей статье. Лицензиат вправе расторгнуть настоящий Договор и (или) потребовать возмещения ему убытков, если какое-либо из утверждений подп. 4.1.1–4.1.8. настоящей статьи полностью или частично окажется неверным, ложным или ошибочным.</p>

<p class="indent">Без предварительного письменного согласия Лицензиата Лицензиар в течение Срока и на Территории не имеет права:</p>

<p>уступать права на использование Объектов каким-либо способом, а равно обременять каким-либо образом, или передавать Объекты в коллективное или доверительное управление, на время или навсегда, полностью или в части, а также заключать какие-либо иные сделки (независимо от формы сделок) в отношении Права использования;</p>

<p>самостоятельно использовать Объекты способами, указанными в настоящем Договоре, за исключением случаев, специально оговоренных Сторонами.</p>

<p class="indent">В случае предъявления претензий со стороны третьих лиц по поводу нарушения принадлежащих им авторских прав в результате использования принадлежащих третьим лицам объектов авторских прав, либо их части, Лицензиар обязан, не позднее 5 (пяти) дней с момента получения от Лицензиата уведомления о наличии указанных обстоятельств, изучить предъявленные претензии, и в случае наличия обстоятельств для признания их обоснованными, удовлетворить претензии за счет собственных средств. В случае отказа Лицензиара от участия в урегулировании полученных претензий или отказа от удовлетворения такой претензии за счет собственных средств, Лицензиат будет иметь право урегулировать претензию по своему собственному усмотрению, и Лицензиар будет обязан безоговорочно возместить Лицензиату все документально подтвержденные расходы, понесенные им в результате удовлетворения указанных претензий.</p>

<p class="indent">В случае, если третьими лицами будет подан иск по поводу нарушения принадлежащих им прав в результате использования принадлежащих третьим лицам Объектов, либо их части, Лицензиат обязан уведомить об этом Лицензиара. Лицензиар в данном случае обязан выступить в судебном процессе совместно с Лицензиатом. В случае удовлетворения иска, Лицензиар обязан не позднее 10 (десяти) дней с момента вступления решения в законную силу выплатить сумму, указанную в решении суда и возместить в полном объеме документально подтвержденные расходы Лицензиата, возникшие у него в связи с участием в судебном процессе и исполнением судебного решения.</p>

<p class="indent">Лицензиат обязуется своевременно выплатить Лицензиару вознаграждение в соответствии со ст. 3 настоящего Договора.</p>

<p class="indent">Лицензиар обязуется передать Лицензиату Объекты, указанные в соответствующих приложениях к Договору, посредством сети Интернет.</p>

<p class="indent">Лицензиар в течение Срока вправе осуществлять переработку Объектов, в том числе создавать производные произведения на основе Объектов и/или их частей, предоставленных Лицензиату в рамках настоящего Договора, в том числе создавать новые версии произведений, ремиксы, аранжировки, осуществлять перевод и т.п.</p>

<p class="indent">Лицензиат имеет право передавать полученные по настоящему Договору права любым третьим лицам (выдавать сублицензии) без согласования с Лицензиаром, в том числе Лицензиат без дополнительного согласования с Лицензиаром имеет право передавать полученные по настоящему Договору права в управление в организации по коллективному управлению правами и получать от указанных организаций вознаграждение по установленным ставкам.</p>

<p class="indent">Лицензиат вправе осуществлять техническую переработку Объектов (автринг, конвертацию, адаптирование).</p>

<p class="indent">Лицензиат вправе включать Объекты в состав любых сложных объектов и использовать их в составе сложных объектов, в том числе, но не ограничиваясь: аудиовизуальных произведений, мультимедийных продуктов, театрально-зрелищных представлений и т.п. любым не запрещенным законом способом на территории всех стран мира в течение всего срока охраны права на указанные Объекты, на что Лицензиар настоящим дает свое согласие.</p>

<div class="section-title">СРОК ДЕЙСТВИЯ ДОГОВОРА И ПОРЯДОК ЕГО РАСТОРЖЕНИЯ</div>

<p class="indent">Настоящий Договор вступает в силу с момента его подписания Сторонами, и действует по <b>${r.futureDate}</b>. Срок действия настоящего Договора считается автоматически продленным на каждый последующий календарный год на тех же условиях при условии отсутствия уведомления об ином, направленного одной Стороной в адрес другой Стороны не менее чем за 30 (тридцать) календарных дней до истечения срока действия настоящего Договора.</p>
